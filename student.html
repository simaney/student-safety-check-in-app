<!DOCTYPE html>
<html>
<head>
<title>Student Safety Check-In</title>

<style>
body{
font-family: Arial;
margin:0;
background:#eef2f3;
text-align:center;
}

header{
background:#2c3e50;
color:white;
padding:20px;
}

.container{
padding:30px;
}

button{
padding:15px 25px;
margin:10px;
font-size:18px;
border:none;
border-radius:8px;
cursor:pointer;
}

.safe{
background:#27ae60;
color:white;
}

.alert{
background:#e74c3c;
color:white;
}

.location{
background:#3498db;
color:white;
}

.note{
background:#f39c12;
color:white;
}

textarea{
width:80%;
height:100px;
margin:10px;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
}
</style>

<script>

function checkSafe(){
alert("✅ You have checked in as SAFE.");
}

function sendAlert(){
alert("🚨 Emergency alert sent to campus security!");
}

function getLocation(){
if(navigator.geolocation){
navigator.geolocation.getCurrentPosition(showPosition);
}else{
alert("Geolocation not supported");
}
}

function showPosition(position){
alert("Latitude: " + position.coords.latitude +
"\nLongitude: " + position.coords.longitude);
}

function saveNote(){
alert("📝 Safety note saved.");
}

</script>

</head>

<body>

<header>
<h1>Student Safety Check-In</h1>
<p>Stay safe on campus</p>
</header>

<div class="container">

<button class="safe" onclick="checkSafe()">✔️ I'm Safe</button>

<br>

<button class="alert" onclick="sendAlert()">🚨 Send Alert</button>

<br>

<button class="location" onclick="getLocation()">📍 Share Location</button>

<br>

<textarea placeholder="Write a safety note..."></textarea>

<br>

<button class="note" onclick="saveNote()">Save Note</button>

</div>

</body>
</html>
